<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DICTIONARY-O-PEDIA | Dictionary</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="petal-container" id="petalContainer"></div>

  <div class="box">
    <h1>Dictionary Search</h1>
    <p class="subtitle">Search meanings, see examples, translate definitions, and save favorites.</p>

    <div class="search-area">
      <input type="text" id="searchBox" placeholder="Type a word like apple" />
      <select id="languageSelect">
        <option value="English">English</option>
        <option value="Hindi">Hindi</option>
        <option value="Bengali">Bengali</option>
      </select>
      <button class="button" onclick="searchWord()">Search</button>
    </div>

    <div class="section" id="result">
      Start by typing a word.
    </div>

    <div class="section">
      <h2>Popular Searches</h2>
      <div class="popular-searches">
        <button onclick="fillWord('apple')">apple</button>
        <button onclick="fillWord('code')">code</button>
        <button onclick="fillWord('learn')">learn</button>
        <button onclick="fillWord('dictionary')">dictionary</button>
        <button onclick="fillWord('science')">science</button>
      </div>
    </div>

    <div class="section">
      <h2>Favorites</h2>
      <div class="button-row">
        <button class="button" onclick="saveCurrentFavorite()">Save Current Word</button>
        <button class="button" onclick="loadFavorites()">Load Favorites</button>
      </div>
      <ul id="favoritesList"></ul>
    </div>

    <div class="section feedback-box">
      <h2>Feedback</h2>
      <textarea id="feedbackText" placeholder="Write your feedback here..."></textarea>
      <button class="button" onclick="submitFeedback()">Submit Feedback</button>
      <p id="feedbackMsg"></p>
    </div>

    <div class="section">
      <h2>Navigate</h2>
      <div class="nav-links">
        <a class="button link-btn" href="index.html">Home</a>
        <a class="button link-btn" href="auth.html">Signup / Login</a>
        <a class="button link-btn" href="game.html">Mini Game</a>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
